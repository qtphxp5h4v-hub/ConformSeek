name: Build ConformSeek

# Trigger on version tags (e.g. git tag v2.0.0 && git push --tags)
# or manually from the Actions tab
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for this build (e.g. 2.0.1)'
        required: false
        default: 'dev'

# Required for creating GitHub releases
permissions:
  contents: write

jobs:
  # ═══════════════════════════════════════════════════════════════
  # Stage 1: Compile Python backend on each platform
  # ═══════════════════════════════════════════════════════════════
  build-python:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14          # Apple Silicon runner (M1)
            artifact: python-macos-arm64
            binary: conformseek_api
          - os: macos-13          # Intel runner
            artifact: python-macos-x64
            binary: conformseek_api
          - os: windows-latest
            artifact: python-windows-x64
            binary: conformseek_api.exe
          - os: ubuntu-latest
            artifact: python-linux-x64
            binary: conformseek_api

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install fastapi uvicorn propka biopython numpy requests zeep lxml

      - name: Compile with PyInstaller
        run: |
          pyinstaller --onefile --name conformseek_api \
            --collect-all propka \
            --collect-all Bio \
            --collect-all zeep \
            --collect-all lxml \
            conformseek_server.py

      - name: Verify binary exists
        run: ls -la dist/
        shell: bash

      - name: Upload Python binary
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}
          retention-days: 1

  # ═══════════════════════════════════════════════════════════════
  # Stage 2: Build Electron app on each platform
  # ═══════════════════════════════════════════════════════════════
  build-electron:
    needs: build-python
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (.dmg)
          - os: macos-14
            python_artifact: python-macos-arm64
            electron_args: --mac --arm64
            output_pattern: |
              dist/*.dmg
          # macOS Intel (.dmg)
          - os: macos-13
            python_artifact: python-macos-x64
            electron_args: --mac --x64
            output_pattern: |
              dist/*.dmg
          # Windows x64 (.exe installer)
          - os: windows-latest
            python_artifact: python-windows-x64
            electron_args: --win --x64
            output_pattern: |
              dist/*.exe
          # Linux x64 (.AppImage)
          - os: ubuntu-latest
            python_artifact: python-linux-x64
            electron_args: --linux --x64
            output_pattern: |
              dist/*.AppImage

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Download Python binary
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.python_artifact }}
          path: python-dist/

      - name: Make binary executable (macOS/Linux)
        if: runner.os != 'Windows'
        run: chmod +x python-dist/conformseek_api

      - name: Verify python-dist contents
        run: ls -la python-dist/
        shell: bash

      - name: Build React app
        run: npm run build
        env:
          CI: false  # Don't treat warnings as errors

      - name: Build Electron app
        run: npx electron-builder ${{ matrix.electron_args }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List build output
        run: ls -la dist/
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.blockmap
            dist/latest*.yml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # Stage 3: Create GitHub Release with all binaries
  # ═══════════════════════════════════════════════════════════════
  release:
    needs: build-electron
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          pattern: release-*
          merge-multiple: true

      - name: List all artifacts
        run: find artifacts/ -type f | head -30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ConformSeek ${{ github.ref_name }}
          draft: true
          generate_release_notes: true
          files: |
            artifacts/*.dmg
            artifacts/*.exe
            artifacts/*.AppImage
          body: |
            ## ConformSeek ${{ github.ref_name }}

            pH-Dependent Protein Conformational Analysis

            ### Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | macOS (Apple Silicon) | `ConformSeek-*-arm64.dmg` | M1/M2/M3/M4 Macs |
            | macOS (Intel) | `ConformSeek-*-x64.dmg` | Older Intel Macs |
            | Windows | `ConformSeek-Setup-*.exe` | Windows 10/11 x64 |
            | Linux | `ConformSeek-*.AppImage` | Ubuntu/Debian/Fedora x64 |

            ### macOS Installation
            1. Download the `.dmg` for your architecture
            2. Open the `.dmg` and drag ConformSeek to Applications
            3. Open Terminal and run: `xattr -cr /Applications/ConformSeek.app`
            4. Open ConformSeek from Applications

            ### Windows Installation
            1. Download the `.exe` installer
            2. Run the installer (Windows SmartScreen may warn — click "More info" → "Run anyway")

            ### Linux Installation
            1. Download the `.AppImage`
            2. Make it executable: `chmod +x ConformSeek-*.AppImage`
            3. Run it: `./ConformSeek-*.AppImage`

            ### First Launch
            - The app will prompt you to set up a free [BRENDA](https://www.brenda-enzymes.org/register.php) account for enzyme pH data
            - You can skip this and configure it later in Settings (⚙)
